# docker-compose.yml
# ← УДАЛИ строку version: '3.9' (Docker Compose v2+ её игнорирует)

services:
  db:
    image: postgres:16-alpine
    container_name: soundwave-db
    environment:
      POSTGRES_DB: soundwave
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:  # ← Добавь healthcheck для надёжности
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: soundwave-backend
    # ← УДАЛИ environment: PYTHONPATH=/app (он не нужен, FastAPI сам находит модули)
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy  # ← Ждём, пока БД будет готова
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: soundwave-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  media_volume: